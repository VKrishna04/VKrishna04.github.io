# wrangler.toml
name = 'me'
compatibility_date = "2025-08-27"

[assets]
directory = "./dist"

[build]
command = "npm run build"

[vars]
NODE_VERSION = "24"
NPM_FLAGS = "--production=false"
NODE_OPTIONS = "--max-old-space-size=4096"

# Production environment
[env.production]
name = "me"

[env.production.vars]
NODE_VERSION = "24"
NPM_FLAGS = "--production=false"

# Preview environment for feature branches
[env.preview]
name = "me-preview"

[env.preview.vars]
NODE_VERSION = "24"
NPM_FLAGS = "--production=false"
